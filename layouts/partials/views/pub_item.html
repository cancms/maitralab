{{ $item := .item }} {{ $index := .index }}

<div class="pub-list-item" style="margin-bottom: 1rem">
  {{/*  <i class="far fa-file-alt pub-icon" aria-hidden="true"></i>   */}}
  {{/* add 1 $index */}}


  {{with $item.url_external}}
  <a href="{{.}}" target="_blank">
    {{end}}
    <span class="pub-title"> {{ $item.title | markdownify | safeHTML}} </span>
    {{with $item.url_external}}
  </a>
  {{end}}

   <div class="article-metadata li-cite-author">
    {{ $item.authors_text | markdownify | safeHTML}}
  </div>

  <div class="pub-journal">{{ $item.journal | markdownify | safeHTML}}</div>

</div>
